<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS — Sign In</title>
  <script src="games/nexus-store.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #06040f; --card: #0f0b1a; --accent: #7c3aed; --accent2: #06b6d4;
      --text: #f1f5f9; --muted: #64748b; --border: rgba(124,58,237,0.2);
      --success: #22c55e; --error: #ef4444;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(124,58,237,.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 30%, rgba(6,182,212,.1) 0%, transparent 50%);
    }
    canvas { position: fixed; inset: 0; z-index: 0; opacity: .35; pointer-events: none; }
    .wrap { position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 20px; }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 36px 32px; box-shadow: 0 24px 48px rgba(0,0,0,.4);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo-icon {
      width: 64px; height: 64px; margin: 0 auto 12px;
      background: linear-gradient(135deg,var(--accent),#9d5cf6); border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 30px; color: #fff;
      box-shadow: 0 0 32px rgba(124,58,237,.6);
    }
    .logo-name { font-size: 22px; font-weight: 800; letter-spacing: 3px; }
    .logo-sub  { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .tabs { display: flex; background: rgba(255,255,255,.05); border-radius: 8px; padding: 4px; margin-bottom: 24px; }
    .tab {
      flex: 1; padding: 8px; background: none; border: none; color: var(--muted);
      font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 6px; transition: all .2s;
    }
    .tab.active { background: var(--accent); color: #fff; }

    .panel { display: none; }
    .panel.active { display: block; }

    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
    input {
      width: 100%; padding: 11px 14px; background: rgba(255,255,255,.05);
      border: 1px solid var(--border); border-radius: 8px; color: var(--text);
      font-size: 14px; outline: none; transition: border-color .2s, box-shadow .2s;
    }
    input::placeholder { color: var(--muted); }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,58,237,.12); }

    .btn {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .2s, box-shadow .2s;
      margin-bottom: 10px;
    }
    .btn-primary { background: linear-gradient(135deg,var(--accent),#9d5cf6); color: #fff; }
    .btn-primary:hover { opacity: .9; box-shadow: 0 0 20px rgba(124,58,237,.4); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-ghost {
      background: rgba(255,255,255,.05); border: 1px solid var(--border); color: var(--muted);
      font-size: 13px;
    }
    .btn-ghost:hover { background: rgba(124,58,237,.1); color: var(--text); border-color: var(--accent); }

    .alert {
      padding: 11px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; display: none;
    }
    .alert-error   { background: rgba(239,68,68,.1);  border: 1px solid rgba(239,68,68,.3);  color: var(--error); }
    .alert-success { background: rgba(34,197,94,.1);  border: 1px solid rgba(34,197,94,.3);  color: var(--success); }

    .back { position: absolute; top: 20px; left: 20px; color: var(--muted); text-decoration: none; font-size: 13px; }
    .back:hover { color: var(--accent); }

    .spin {
      display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3);
      border-radius: 50%; border-top-color: #fff; animation: spin .8s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="bg"></div>
<canvas id="c"></canvas>
<a href="index.html" class="back">← Back</a>

<div class="wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">N</div>
      <div class="logo-name">NEXUS</div>
      <div class="logo-sub">Cursed Gaming Platform</div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="signin">Sign In</button>
      <button class="tab" data-tab="signup">Sign Up</button>
    </div>

    <div class="alert alert-error"   id="err"></div>
    <div class="alert alert-success" id="ok"></div>

    <!-- SIGN IN -->
    <div class="panel active" id="panel-signin">
      <form id="form-signin">
        <div class="form-group">
          <label>Username</label>
          <input id="si-user" type="text" placeholder="your_username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="si-pass" type="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button class="btn btn-primary" type="submit" id="si-btn">Sign In</button>
      </form>
      <button class="btn btn-ghost" id="guest-btn">Continue as Guest</button>
    </div>

    <!-- SIGN UP -->
    <div class="panel" id="panel-signup">
      <form id="form-signup">
        <div class="form-group">
          <label>Display Name</label>
          <input id="su-name" type="text" placeholder="Gojo Satoru" required>
        </div>
        <div class="form-group">
          <label>Username</label>
          <input id="su-user" type="text" placeholder="gojo_satoru" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="su-pass" type="password" placeholder="min 4 characters" required>
        </div>
        <button class="btn btn-primary" type="submit" id="su-btn">Create Account</button>
      </form>
      <button class="btn btn-ghost" id="guest-btn2">Continue as Guest</button>
    </div>
  </div>
</div>

<script>
// Particle canvas
(function(){
  const c = document.getElementById('c');
  const ctx = c.getContext('2d');
  let W, H, pts = [];
  function resize(){ W = c.width = innerWidth; H = c.height = innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for(let i=0;i<80;i++) pts.push({x:Math.random()*2000,y:Math.random()*1200,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.5+.5});
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0;
      if(p.y<0)p.y=H; if(p.y>H)p.y=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(124,58,237,.6)'; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// Tabs
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-' + t.dataset.tab).classList.add('active');
    hideAlerts();
  });
});

function showErr(msg){ const e=document.getElementById('err'); e.textContent=msg; e.style.display='block'; document.getElementById('ok').style.display='none'; }
function showOk(msg){ const e=document.getElementById('ok'); e.textContent=msg; e.style.display='block'; document.getElementById('err').style.display='none'; }
function hideAlerts(){ document.getElementById('err').style.display='none'; document.getElementById('ok').style.display='none'; }

function setLoading(btn, on, label){
  btn.disabled = on;
  btn.innerHTML = on ? '<span class="spin"></span> Loading…' : label;
}

function redirect(){
  const p = new URLSearchParams(location.search);
  location.href = p.get('returnTo') || 'index.html';
}

// Sign in
document.getElementById('form-signin').addEventListener('submit', function(e){
  e.preventDefault(); hideAlerts();
  const btn = document.getElementById('si-btn');
  setLoading(btn, true, 'Sign In');
  try {
    NexusStore.login(
      document.getElementById('si-user').value,
      document.getElementById('si-pass').value
    );
    redirect();
  } catch(err) {
    showErr(err.message);
    setLoading(btn, false, 'Sign In');
  }
});

// Sign up
document.getElementById('form-signup').addEventListener('submit', function(e){
  e.preventDefault(); hideAlerts();
  const btn = document.getElementById('su-btn');
  setLoading(btn, true, 'Create Account');
  try {
    NexusStore.register(
      document.getElementById('su-user').value,
      document.getElementById('su-pass').value,
      document.getElementById('su-name').value
    );
    redirect();
  } catch(err) {
    showErr(err.message);
    setLoading(btn, false, 'Create Account');
  }
});

// Guest
function guestLogin(){
  try { NexusStore.loginAsGuest(); redirect(); }
  catch(err){ showErr(err.message); }
}
document.getElementById('guest-btn').addEventListener('click', guestLogin);
document.getElementById('guest-btn2').addEventListener('click', guestLogin);

// Already logged in?
if(NexusStore.getSession()) redirect();
</script>
</body>
</html>
