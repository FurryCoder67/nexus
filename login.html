<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS — Sign In</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/games/nexus-config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #06040f;
      --card: #0f0b1a;
      --card-hover: #161224;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --text: #f1f5f9;
      --muted: #64748b;
      --border: rgba(124, 58, 237, 0.2);
      --success: #22c55e;
      --error: #ef4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Animated background */
    .bg-animation {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(124, 58, 237, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 30%, rgba(6, 182, 212, 0.1) 0%, transparent 50%);
      z-index: 0;
    }

    .bg-particles {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0.3;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
      50% { transform: translateY(-20px) scale(1.2); opacity: 0.6; }
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--accent), #9d5cf6);
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 28px;
      color: #fff;
      box-shadow: 0 0 30px rgba(124, 58, 237, 0.6);
      letter-spacing: -2px;
      margin-bottom: 12px;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .logo-tagline {
      font-size: 14px;
      color: var(--muted);
      margin-top: 4px;
    }

    .auth-tabs {
      display: flex;
      margin-bottom: 24px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 4px;
    }

    .auth-tab {
      flex: 1;
      padding: 8px 16px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .auth-tab.active {
      background: var(--accent);
      color: #fff;
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
    }

    .oauth-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .oauth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .oauth-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: var(--accent);
    }

    .oauth-btn.google {
      background: rgba(219, 68, 55, 0.1);
      border-color: rgba(219, 68, 55, 0.3);
    }

    .oauth-btn.discord {
      background: rgba(88, 101, 242, 0.1);
      border-color: rgba(88, 101, 242, 0.3);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      color: var(--muted);
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      padding: 0 16px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-input::placeholder {
      color: var(--muted);
    }

    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }

    .submit-btn {
      width: 100%;
      padding: 12px 20px;
      background: linear-gradient(135deg, var(--accent), #9d5cf6);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s ease, box-shadow 0.2s ease;
      margin-bottom: 16px;
    }

    .submit-btn:hover {
      opacity: 0.9;
      box-shadow: 0 0 20px rgba(124, 58, 237, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .guest-link {
      display: block;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      text-decoration: none;
      padding: 8px;
      border-radius: 6px;
      transition: color 0.2s ease, background 0.2s ease;
    }

    .guest-link:hover {
      color: var(--accent);
      background: rgba(124, 58, 237, 0.1);
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 6px;
      padding: 12px;
      color: var(--error);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .back-link {
      position: absolute;
      top: 20px;
      left: 20px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s ease;
    }

    .back-link:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="bg-animation"></div>
  <div class="bg-particles" id="particles"></div>

  <a href="/" class="back-link">
    ← Back to NEXUS
  </a>

  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <div class="logo-icon">N</div>
        <div class="logo-text">NEXUS</div>
        <div class="logo-tagline">Cursed Gaming Platform</div>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="signin">Sign In</button>
        <button class="auth-tab" data-tab="signup">Sign Up</button>
      </div>

      <div class="error-message" id="error-message"></div>

      <!-- Sign In Form -->
      <div class="auth-form active" id="signin-form">
        <div class="oauth-buttons">
          <button class="oauth-btn google" id="google-signin">
            <span>🔍</span>
            Continue with Google
          </button>
          <button class="oauth-btn discord" id="discord-signin">
            <span>🎮</span>
            Continue with Discord
          </button>
        </div>

        <div class="divider">
          <span>or</span>
        </div>

        <form id="email-signin-form">
          <div class="form-group">
            <label class="form-label" for="signin-email">Email</label>
            <input type="email" id="signin-email" class="form-input" placeholder="Enter your email" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="signin-password">Password</label>
            <input type="password" id="signin-password" class="form-input" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="submit-btn" id="signin-submit">
            Sign In
          </button>
        </form>

        <a href="#" class="guest-link" id="guest-signin">Continue as Guest</a>
      </div>

      <!-- Sign Up Form -->
      <div class="auth-form" id="signup-form">
        <div class="oauth-buttons">
          <button class="oauth-btn google" id="google-signup">
            <span>🔍</span>
            Continue with Google
          </button>
          <button class="oauth-btn discord" id="discord-signup">
            <span>🎮</span>
            Continue with Discord
          </button>
        </div>

        <div class="divider">
          <span>or</span>
        </div>

        <form id="email-signup-form">
          <div class="form-group">
            <label class="form-label" for="signup-name">Display Name</label>
            <input type="text" id="signup-name" class="form-input" placeholder="Choose a display name" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="signup-email">Email</label>
            <input type="email" id="signup-email" class="form-input" placeholder="Enter your email" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="signup-password">Password</label>
            <input type="password" id="signup-password" class="form-input" placeholder="Create a password" required minlength="6">
          </div>
          <button type="submit" class="submit-btn" id="signup-submit">
            Create Account
          </button>
        </form>

        <a href="#" class="guest-link" id="guest-signup">Continue as Guest</a>
      </div>
    </div>
  </div>

  <script src="/games/nexus-auth.js"></script>
  <script>
    // Create animated particles
    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 6 + 's';
        container.appendChild(particle);
      }
    }

    // Tab switching
    function setupTabs() {
      const tabs = document.querySelectorAll('.auth-tab');
      const forms = document.querySelectorAll('.auth-form');

      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          const targetTab = tab.dataset.tab;
          
          tabs.forEach(t => t.classList.remove('active'));
          forms.forEach(f => f.classList.remove('active'));
          
          tab.classList.add('active');
          document.getElementById(targetTab + '-form').classList.add('active');
        });
      });
    }

    // Error handling
    function showError(message) {
      const errorEl = document.getElementById('error-message');
      errorEl.textContent = message;
      errorEl.style.display = 'block';
    }

    function hideError() {
      document.getElementById('error-message').style.display = 'none';
    }

    // Loading state
    function setLoading(button, loading) {
      if (loading) {
        button.disabled = true;
        button.innerHTML = '<span class="loading"></span> Loading...';
      } else {
        button.disabled = false;
        button.innerHTML = button.dataset.originalText;
      }
    }

    // Get return URL
    function getReturnUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('returnTo') || '/';
    }

    // Redirect after successful auth
    function redirectAfterAuth() {
      window.location.href = getReturnUrl();
    }

    // OAuth sign in
    async function handleOAuthSignIn(provider) {
      try {
        hideError();
        await NexusAuth.signInWithOAuth(provider);
        // OAuth redirect will handle the rest
      } catch (error) {
        console.error('OAuth error:', error);
        showError('Failed to sign in with ' + provider + '. Please try again.');
      }
    }

    // Email sign in
    async function handleEmailSignIn(event) {
      event.preventDefault();
      
      const button = document.getElementById('signin-submit');
      button.dataset.originalText = button.innerHTML;
      
      try {
        hideError();
        setLoading(button, true);
        
        const email = document.getElementById('signin-email').value;
        const password = document.getElementById('signin-password').value;
        
        await NexusAuth.signInWithEmail(email, password);
        redirectAfterAuth();
      } catch (error) {
        console.error('Sign in error:', error);
        showError(error.message || 'Failed to sign in. Please check your credentials.');
        setLoading(button, false);
      }
    }

    // Email sign up
    async function handleEmailSignUp(event) {
      event.preventDefault();
      
      const button = document.getElementById('signup-submit');
      button.dataset.originalText = button.innerHTML;
      
      try {
        hideError();
        setLoading(button, true);
        
        const name = document.getElementById('signup-name').value;
        const email = document.getElementById('signup-email').value;
        const password = document.getElementById('signup-password').value;
        
        await NexusAuth.signUpWithEmail(email, password, name);
        
        // Show success message
        showError('Account created! Please check your email to verify your account.');
        document.getElementById('error-message').style.background = 'rgba(34, 197, 94, 0.1)';
        document.getElementById('error-message').style.borderColor = 'rgba(34, 197, 94, 0.3)';
        document.getElementById('error-message').style.color = '#22c55e';
        
        setLoading(button, false);
      } catch (error) {
        console.error('Sign up error:', error);
        showError(error.message || 'Failed to create account. Please try again.');
        setLoading(button, false);
      }
    }

    // Guest sign in
    async function handleGuestSignIn() {
      try {
        hideError();
        await NexusAuth.signInAsGuest();
        redirectAfterAuth();
      } catch (error) {
        console.error('Guest sign in error:', error);
        showError('Failed to continue as guest. Please try again.');
      }
    }

    // Initialize page
    document.addEventListener('DOMContentLoaded', async () => {
      createParticles();
      setupTabs();

      // Check if already signed in
      try {
        const user = await NexusAuth.getUser();
        if (user) {
          redirectAfterAuth();
          return;
        }
      } catch (error) {
        console.log('Not signed in, showing login form');
      }

      // Set up event listeners
      document.getElementById('google-signin').addEventListener('click', () => handleOAuthSignIn('google'));
      document.getElementById('google-signup').addEventListener('click', () => handleOAuthSignIn('google'));
      document.getElementById('discord-signin').addEventListener('click', () => handleOAuthSignIn('discord'));
      document.getElementById('discord-signup').addEventListener('click', () => handleOAuthSignIn('discord'));
      
      document.getElementById('email-signin-form').addEventListener('submit', handleEmailSignIn);
      document.getElementById('email-signup-form').addEventListener('submit', handleEmailSignUp);
      
      document.getElementById('guest-signin').addEventListener('click', (e) => {
        e.preventDefault();
        handleGuestSignIn();
      });
      document.getElementById('guest-signup').addEventListener('click', (e) => {
        e.preventDefault();
        handleGuestSignIn();
      });

      // Handle OAuth callback
      const params = new URLSearchParams(window.location.search);
      if (params.get('access_token')) {
        // OAuth callback - redirect to return URL
        redirectAfterAuth();
      }
    });
  </script>
</body>
</html>
