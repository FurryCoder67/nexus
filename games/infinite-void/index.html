<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinite Void — NEXUS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#020208;--p:#6366f1;--p2:#8b5cf6;--cyan:#06b6d4;--text:#fff;--muted:#94a3b8;}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(139,92,246,.12) 0%,transparent 65%);pointer-events:none;}
    .back{position:fixed;top:14px;left:16px;z-index:100;display:flex;align-items:center;gap:6px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);color:#c7d2fe;padding:6px 14px;border-radius:8px;text-decoration:none;font-size:.78rem;font-weight:700;letter-spacing:.06em;transition:all .15s;}
    .back:hover{background:rgba(99,102,241,.3);color:#fff;}
    .center{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center;padding:24px;}
    .icon{font-size:5rem;margin-bottom:8px;filter:drop-shadow(0 0 40px rgba(139,92,246,.8));animation:pulse 3s ease-in-out infinite;}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.08);opacity:.8;}}
    h1{font-family:'Orbitron';font-size:clamp(2rem,6vw,3.5rem);font-weight:900;letter-spacing:.06em;background:linear-gradient(135deg,#c4b5fd 0%,#8b5cf6 50%,#4f46e5 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .genre{font-size:.8rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-top:-8px;}
    .desc{max-width:480px;color:var(--muted);line-height:1.7;font-size:.95rem;}
    .badge{display:inline-flex;align-items:center;gap:8px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:#fbbf24;padding:8px 20px;border-radius:8px;font-size:.85rem;font-weight:700;letter-spacing:.08em;}
    canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
    .center{z-index:1;}
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <a class="back" href="../../index.html">← NEXUS</a>
  <div class="center">
    <div class="icon">🌌</div>
    <h1>INFINITE VOID</h1>
    <div class="genre">Domain Expansion · Puzzle</div>
    <p class="desc">You are trapped inside Gojo's Unlimited Void. Navigate an ever-expanding domain where information overload is your greatest enemy. Solve cursed puzzles before your mind shatters.</p>
    <div class="badge">⚡ Coming Soon</div>
  </div>
  <script>
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    let W, H, stars = [];
    function resize(){ W = c.width = innerWidth; H = c.height = innerHeight; }
    window.addEventListener('resize', resize); resize();
    for(let i=0;i<120;i++) stars.push({x:Math.random()*2-1,y:Math.random()*2-1,z:Math.random()});
    function tick(){
      ctx.fillStyle='rgba(2,2,8,0.15)';ctx.fillRect(0,0,W,H);
      stars.forEach(s=>{
        s.z-=0.003;
        if(s.z<=0){s.x=Math.random()*2-1;s.y=Math.random()*2-1;s.z=1;}
        const sx=s.x/s.z*(W/2)+W/2, sy=s.y/s.z*(H/2)+H/2;
        const r=Math.max(0,(1-s.z)*2.5);
        ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);
        ctx.fillStyle=`rgba(139,92,246,${(1-s.z)*0.8})`;ctx.fill();
      });
      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
