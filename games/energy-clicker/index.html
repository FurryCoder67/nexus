<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursed Energy Clicker — NEXUS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/games/nexus-config.js"></script>
    <script src="/games/nexus-auth.js"></script>
    <script src="/games/nexus-db.js"></script>
    <script src="/games/nexus-ratings.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #06040f 0%, #0f0b1a 50%, #06040f 100%);
            color: #f1f5f9;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
        }

        .title {
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(124, 58, 237, 0.8);
        }

        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .energy-display {
            font-size: 64px;
            font-weight: 900;
            color: #7c3aed;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(124, 58, 237, 0.6);
        }

        .per-second {
            font-size: 18px;
            color: #06b6d4;
            margin-bottom: 30px;
        }

        .click-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #9d5cf6);
            border: 4px solid rgba(124, 58, 237, 0.5);
            color: #fff;
            font-size: 48px;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 0 40px rgba(124, 58, 237, 0.6);
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .click-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 60px rgba(124, 58, 237, 0.8);
        }

        .click-btn:active {
            transform: scale(0.95);
        }

        .upgrades {
            display: grid;
            gap: 10px;
            margin-bottom: 30px;
        }

        .upgrade-btn {
            background: rgba(124, 58, 237, 0.2);
            border: 1px solid rgba(124, 58, 237, 0.4);
            border-radius: 8px;
            padding: 15px;
            color: #f1f5f9;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .upgrade-btn:hover:not(:disabled) {
            background: rgba(124, 58, 237, 0.3);
            border-color: #7c3aed;
        }

        .upgrade-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .upgrade-info {
            text-align: left;
        }

        .upgrade-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .upgrade-desc {
            font-size: 12px;
            color: #94a3b8;
        }

        .upgrade-cost {
            font-weight: 700;
            color: #7c3aed;
            font-size: 18px;
        }

        .stats {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #7c3aed;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 10px 20px;
            color: #f1f5f9;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .save-btn {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-left: 10px;
            transition: all 0.2s ease;
        }

        .save-btn:hover {
            opacity: 0.9;
        }

        .floating-number {
            position: fixed;
            font-size: 24px;
            font-weight: 700;
            color: #7c3aed;
            pointer-events: none;
            animation: float-up 1s ease-out forwards;
        }

        @keyframes float-up {
            from {
                opacity: 1;
                transform: translateY(0);
            }

            to {
                opacity: 0;
                transform: translateY(-100px);
            }
        }
    </style>
</head>

<body>
    <div class="game-container">
        <h1 class="title">⚡ CURSED ENERGY CLICKER</h1>
        <p class="subtitle">Accumulate cursed energy and become the strongest sorcerer!</p>

        <div class="energy-display" id="energy">0</div>
        <div class="per-second" id="per-second">+0 per second</div>

        <button class="click-btn" id="click-btn" onclick="clickEnergy()">⚡</button>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Total Clicks</div>
                <div class="stat-value" id="total-clicks">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Play Time</div>
                <div class="stat-value" id="play-time">0:00</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Per Click</div>
                <div class="stat-value" id="per-click">+1</div>
            </div>
        </div>

        <div class="upgrades">
            <button class="upgrade-btn" id="upgrade-1" onclick="buyUpgrade(1)">
                <div class="upgrade-info">
                    <div class="upgrade-name">🖱️ Cursed Finger</div>
                    <div class="upgrade-desc">+1 energy per click (Owned: <span id="owned-1">0</span>)</div>
                </div>
                <div class="upgrade-cost" id="cost-1">10</div>
            </button>

            <button class="upgrade-btn" id="upgrade-2" onclick="buyUpgrade(2)">
                <div class="upgrade-info">
                    <div class="upgrade-name">👤 Cursed Spirit</div>
                    <div class="upgrade-desc">+1 energy per second (Owned: <span id="owned-2">0</span>)</div>
                </div>
                <div class="upgrade-cost" id="cost-2">50</div>
            </button>

            <button class="upgrade-btn" id="upgrade-3" onclick="buyUpgrade(3)">
                <div class="upgrade-info">
                    <div class="upgrade-name">⚔️ Sorcerer</div>
                    <div class="upgrade-desc">+5 energy per second (Owned: <span id="owned-3">0</span>)</div>
                </div>
                <div class="upgrade-cost" id="cost-3">250</div>
            </button>

            <button class="upgrade-btn" id="upgrade-4" onclick="buyUpgrade(4)">
                <div class="upgrade-info">
                    <div class="upgrade-name">🏯 Domain Expansion</div>
                    <div class="upgrade-desc">+25 energy per second (Owned: <span id="owned-4">0</span>)</div>
                </div>
                <div class="upgrade-cost" id="cost-4">1000</div>
            </button>
        </div>

        <div>
            <a href="/" class="back-btn">← Back to NEXUS</a>
            <button class="save-btn" onclick="saveProgress()">💾 Save Progress</button>
        </div>
    </div>

    <script>
        // Game state
        let energy = 0;
        let totalClicks = 0;
        let perClick = 1;
        let perSecond = 0;
        let startTime = Date.now();

        // Upgrades
        const upgrades = {
            1: { owned: 0, baseCost: 10, effect: 1, type: 'click' },
            2: { owned: 0, baseCost: 50, effect: 1, type: 'auto' },
            3: { owned: 0, baseCost: 250, effect: 5, type: 'auto' },
            4: { owned: 0, baseCost: 1000, effect: 25, type: 'auto' }
        };

        // Load saved progress
        const saved = localStorage.getItem('nexus_energy_clicker');
        if (saved) {
            const data = JSON.parse(saved);
            energy = data.energy || 0;
            totalClicks = data.totalClicks || 0;
            Object.assign(upgrades, data.upgrades || {});
            calculateStats();
        }

        function clickEnergy() {
            energy += perClick;
            totalClicks++;

            // Show floating number
            const btn = document.getElementById('click-btn');
            const rect = btn.getBoundingClientRect();
            const floater = document.createElement('div');
            floater.className = 'floating-number';
            floater.textContent = '+' + perClick;
            floater.style.left = rect.left + rect.width / 2 + 'px';
            floater.style.top = rect.top + 'px';
            document.body.appendChild(floater);
            setTimeout(() => floater.remove(), 1000);

            updateDisplay();
        }

        function buyUpgrade(id) {
            const upgrade = upgrades[id];
            const cost = Math.floor(upgrade.baseCost * Math.pow(1.15, upgrade.owned));

            if (energy >= cost) {
                energy -= cost;
                upgrade.owned++;
                calculateStats();
                updateDisplay();
            }
        }

        function calculateStats() {
            perClick = 1;
            perSecond = 0;

            for (const id in upgrades) {
                const upgrade = upgrades[id];
                if (upgrade.type === 'click') {
                    perClick += upgrade.owned * upgrade.effect;
                } else if (upgrade.type === 'auto') {
                    perSecond += upgrade.owned * upgrade.effect;
                }
            }
        }

        function updateDisplay() {
            document.getElementById('energy').textContent = Math.floor(energy).toLocaleString();
            document.getElementById('per-second').textContent = '+' + perSecond + ' per second';
            document.getElementById('total-clicks').textContent = totalClicks.toLocaleString();
            document.getElementById('per-click').textContent = '+' + perClick;

            // Update upgrade buttons
            for (const id in upgrades) {
                const upgrade = upgrades[id];
                const cost = Math.floor(upgrade.baseCost * Math.pow(1.15, upgrade.owned));
                const btn = document.getElementById('upgrade-' + id);
                const costEl = document.getElementById('cost-' + id);
                const ownedEl = document.getElementById('owned-' + id);

                costEl.textContent = cost.toLocaleString();
                ownedEl.textContent = upgrade.owned;
                btn.disabled = energy < cost;
            }
        }

        function updatePlayTime() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('play-time').textContent =
                minutes + ':' + seconds.toString().padStart(2, '0');
        }

        async function saveProgress() {
            // Save to localStorage
            localStorage.setItem('nexus_energy_clicker', JSON.stringify({
                energy,
                totalClicks,
                upgrades
            }));

            // Save stats to database
            try {
                const playtime = Math.floor((Date.now() - startTime) / 1000);
                await NexusDB.saveStats('energy-clicker', {
                    score: Math.floor(energy),
                    won: energy >= 10000,
                    playtime_seconds: playtime,
                    extra: {
                        total_clicks: totalClicks,
                        per_second: perSecond,
                        upgrades: upgrades
                    }
                });

                alert('Progress saved! ✅');
            } catch (error) {
                console.error('Failed to save to cloud:', error);
                alert('Saved locally, but cloud save failed. Sign in to save to cloud!');
            }
        }

        // Auto-save every 30 seconds
        setInterval(saveProgress, 30000);

        // Passive income
        setInterval(() => {
            energy += perSecond / 10;
            updateDisplay();
        }, 100);

        // Update play time
        setInterval(updatePlayTime, 1000);

        // Initial display
        updateDisplay();
        updatePlayTime();

        // Save on page unload
        window.addEventListener('beforeunload', saveProgress);
    </script>
</body>

</html>
