<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.6" stop-color="#6b21a8"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <radialGradient id="energyGrad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#e9d5ff" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#7c3aed" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <g id="gun">
      <!-- simplified stylized gun silhouette -->
      <path d="M6 20 L46 20 L60 14 L66 14 L66 10 L56 10 L52 4 L42 4 L36 10 L12 10 Z" fill="#111"/>
    </g>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="64" fill="url(#bgGrad)"/>

  <!-- energy aura -->
  <g filter="url(#glow)">
    <path d="M120 360 C140 260, 220 220, 260 200 C300 180, 350 170, 390 200 C430 230, 420 290, 360 320 C300 350, 200 380, 120 360 Z"
      fill="url(#energyGrad)" opacity="0.95"/>
    <path d="M150 380 C190 300, 250 270, 290 250 C340 230, 390 240, 410 280 C430 320, 390 350, 330 365 C270 380, 190 400, 150 380 Z"
      fill="#c7a9ff" opacity="0.12"/>
  </g>

  <!-- ring of guns -->
  <g transform="translate(256,256)">
    <!-- place 6 gun silhouettes rotated around center -->
    <g transform="rotate(0) translate(-220, -18) scale(2.8)" fill="#0b1020" opacity="0.95"> <use href="#gun"/> </g>
    <g transform="rotate(60) translate(-220, -18) scale(2.8)" fill="#0b1020" opacity="0.95"> <use href="#gun"/> </g>
    <g transform="rotate(120) translate(-220, -18) scale(2.8)" fill="#0b1020" opacity="0.95"> <use href="#gun"/> </g>
    <g transform="rotate(180) translate(-220, -18) scale(2.8)" fill="#0b1020" opacity="0.95"> <use href="#gun"/> </g>
    <g transform="rotate(240) translate(-220, -18) scale(2.8)" fill="#0b1020" opacity="0.95"> <use href="#gun"/> </g>
    <g transform="rotate(300) translate(-220, -18) scale(2.8)" fill="#0b1020" opacity="0.95"> <use href="#gun"/> </g>
  </g>

  <!-- central H with inner stroke and glow -->
  <g transform="translate(256,256)" text-anchor="middle" dominant-baseline="central">
    <text x="0" y="8" font-family="'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="180" fill="#0b0b0f" stroke="#fff" stroke-width="6" paint-order="stroke">H</text>
    <text x="0" y="8" font-family="'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="180" fill="url(#energyGrad)" opacity="0.95" style="mix-blend-mode:screen; filter: url(#glow);">H</text>
  </g>

  <!-- small inner accent ribbons -->
  <path d="M180 220 C210 200, 230 190, 260 190" stroke="#ffd1ff" stroke-width="6" fill="none" opacity="0.85" filter="url(#glow)"/>
  <path d="M332 292 C300 280, 290 270, 260 270" stroke="#9be6ff" stroke-width="5" fill="none" opacity="0.9" filter="url(#glow)"/>

</svg>
